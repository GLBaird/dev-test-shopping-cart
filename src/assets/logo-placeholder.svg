<svg
        width="64"
        height="64"
        viewBox="0 0 64 64"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
>
    <defs>
        <linearGradient id="tileFill" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="var(--logo-tile-start, #F8FAFC)" />
            <stop offset="100%" stop-color="var(--logo-tile-end, #E2E8F0)" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
                    dx="0"
                    dy="1.5"
                    stdDeviation="2"
                    flood-color="var(--logo-shadow, #0F172A)"
                    flood-opacity="0.10"
            />
        </filter>
    </defs>

    <!-- Tile -->
    <rect
            x="8"
            y="8"
            width="48"
            height="48"
            rx="14"
            fill="url(#tileFill)"
            stroke="var(--logo-border, #CBD5E1)"
            stroke-width="1"
            filter="url(#shadow)"
    />

    <!-- Grid -->
    <g
            stroke="var(--logo-grid, #CBD5E1)"
            stroke-width="0.75"
            opacity="0.55"
    >
        <path d="M20 8V56" />
        <path d="M32 8V56" />
        <path d="M44 8V56" />
        <path d="M8 20H56" />
        <path d="M8 32H56" />
        <path d="M8 44H56" />
    </g>

    <!-- Center guides -->
    <g
            stroke="var(--logo-guide, #94A3B8)"
            stroke-width="0.8"
            stroke-dasharray="2 2"
            opacity="0.9"
    >
        <path d="M32 12V52" />
        <path d="M12 32H52" />
    </g>

    <!-- Construction circles -->
    <g
            stroke="var(--logo-guide, #94A3B8)"
            stroke-width="0.9"
            opacity="0.95"
    >
        <circle cx="32" cy="32" r="16" />
        <circle cx="32" cy="32" r="10" />
    </g>

    <!-- Anchor points -->
    <g
            fill="var(--logo-anchor-fill, #FFFFFF)"
            stroke="var(--logo-guide, #94A3B8)"
            stroke-width="0.9"
    >
        <circle cx="24" cy="24" r="2" />
        <circle cx="40" cy="24" r="2" />
        <circle cx="24" cy="40" r="2" />
        <circle cx="40" cy="40" r="2" />
    </g>
</svg>